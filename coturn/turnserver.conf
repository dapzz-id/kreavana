# Coturn TURN Server Configuration for Kreavana

# Listening IP (listen on all interfaces inside container)
listening-ip=0.0.0.0

# Listening port
listening-port=3478

# Relay ports range (dipersempit agar port mapping Docker tidak terlalu banyak)
min-port=49152
max-port=49200

# Use fingerprint in TURN message
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Static user credentials (untuk development)
user=kreavana:kreavana2025

# Realm
realm=kreavana.local

# Log to stdout (Docker logs)
log-file=stdout

# Verbose logging
verbose

# No TLS untuk development
no-tls
no-dtls

# Disable CLI
no-cli

# Allow loopback peers (untuk development di LAN yang sama)
allow-loopback-peers

# Relay IP (inside container, bind relay sockets to all interfaces)
relay-ip=0.0.0.0

# External IP = IP LAN komputer Anda
# Coturn akan memberitahu client bahwa relay-nya ada di IP ini
external-ip=192.168.0.103

# No stale nonce (simpler auth for development)
no-stale-nonce

# Unlimited allocations for development
total-quota=0
